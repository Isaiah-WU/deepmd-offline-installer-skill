name: Nightly Build & Publish

# PyTorch-style daily pipeline:
#   build offline installers (CPU + CUDA) -> publish to a GitHub Release ->
#   regenerate assets/manifest.json -> commit it back.
# dpack then reads manifest.json and installs the right build per machine.

on:
  schedule:
    - cron: '17 2 * * *'    # daily at 02:17 UTC (off-peak)
  push:
    branches: [main]
    paths:
      - 'assets/construct.yaml'
      - 'assets/version.txt'
      - 'scripts/build.sh'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Which variant(s) to build (use "cpu" for a fast, low-risk first test)'
        type: choice
        options: [all, cpu, cuda129]
        default: all

permissions:
  contents: write          # create releases + commit the regenerated manifest

defaults:
  run:
    shell: bash -el {0}    # login shell so `conda activate` works

jobs:
  # 0) Decide which variants to build (manual runs can pick cpu / cuda129 / all).
  setup:
    name: Select variants
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          V="${{ github.event.inputs.variant || 'all' }}"
          CPU='{"label":"cpu","cuda":"","split":""}'
          GPU='{"label":"cuda129","cuda":"12.9","split":"--split 3"}'
          case "$V" in
            cpu)     echo "matrix={\"include\":[$CPU]}" >> "$GITHUB_OUTPUT" ;;
            cuda129) echo "matrix={\"include\":[$GPU]}" >> "$GITHUB_OUTPUT" ;;
            *)       echo "matrix={\"include\":[$CPU,$GPU]}" >> "$GITHUB_OUTPUT" ;;
          esac

  # 1) Create the Release once (avoids a race when matrix jobs upload in parallel).
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(cat assets/version.txt)"
          TAG="v${VERSION}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "DeePMD-kit ${VERSION} offline installers" \
              --notes "Auto-published by nightly CI. Use dpack to install: \`dpack install dp\`."

  # 2) Build each selected variant, upload to the Release, emit a manifest fragment.
  build:
    name: Build ${{ matrix.label }}
    needs: [setup, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Only cuda129 is buildable from conda-forge today (one cudaXXX build per
      # deepmd release; it covers the whole 12.x driver line via NVIDIA
      # minor-version compatibility). See references/verification-log.md.
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (GPU build is large)
        if: matrix.cuda != ''
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: false
          docker-images: false

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          auto-update-conda: true

      - name: Install constructor
        run: conda install -n base constructor conda-libmamba-solver -y

      - name: Build offline installer
        env:
          CUDA_FLAG: ${{ matrix.cuda && format('--cuda {0}', matrix.cuda) || '' }}
        run: |
          bash scripts/build.sh \
            --version "$(cat assets/version.txt)" \
            ${CUDA_FLAG} ${{ matrix.split }} \
            --backend all --torch-version ">=2.5"
          echo "=== built artifacts ==="
          # Match ONLY the final installer(s); the constructor cache under
          # dist/<variant>/cache/ holds unrelated package scripts (e.g.
          # install-libstdc++.sh) that must not be uploaded.
          find dist -type f \( -name 'deepmd-kit-*.sh' -o -name 'deepmd-kit-*.sh.[0-9]*' \) -exec ls -lh {} \;

      - name: Upload installer to the Release (keep only latest per variant)
        env:
          GH_TOKEN: ${{ github.token }}
          VARIANT: ${{ matrix.label }}
        run: |
          TAG="v$(cat assets/version.txt)"
          # Keep-latest: delete any existing assets for THIS variant (old-named or
          # earlier dates) before uploading the new dated build. The variant name
          # sits right before '-Linux', so '-<variant>-Linux' is a precise anchor.
          # cpu runs only touch cpu assets; cuda129 only cuda129 — no cross-delete.
          gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null \
            | grep -E "^deepmd-kit-.*-${VARIANT}-Linux" \
            | while read -r a; do echo "removing old: $a"; gh release delete-asset "$TAG" "$a" -y; done || true
          # A --split build leaves BOTH the parts (.0/.1/.2) and the original full
          # .sh. Upload ONLY the parts when present (the full file is >2GiB and
          # GitHub rejects it); otherwise upload the single .sh.
          mapfile -t parts < <(find dist -type f -name 'deepmd-kit-*.sh.[0-9]*' | sort)
          if [ ${#parts[@]} -gt 0 ]; then
            files=("${parts[@]}")
          else
            mapfile -t files < <(find dist -type f -name 'deepmd-kit-*.sh')
          fi
          [ ${#files[@]} -gt 0 ] || { echo "no installer to upload"; exit 1; }
          printf 'uploading: %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --clobber

      - name: Emit manifest fragment
        env:
          REPO: ${{ github.repository }}
          CUDA: ${{ matrix.cuda }}
        run: python scripts/gen_manifest_fragment.py

      - name: Upload fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest-fragment-${{ matrix.label }}
          path: frag/*.json
          retention-days: 7

  # 3) Merge fragments -> assets/manifest.json -> commit back to main.
  publish-manifest:
    name: Publish manifest.json
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download all fragments
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-fragment-*
          path: frag
          merge-multiple: true

      - name: Regenerate manifest.json
        env:
          REPO: ${{ github.repository }}
        run: python scripts/merge_manifest.py

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/manifest.json
          if git diff --cached --quiet; then
            echo "manifest unchanged"
          else
            git commit -m "ci: update manifest.json from nightly publish [skip ci]"
            git push
          fi

  pass:
    name: Pass
    needs: [build, publish-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
