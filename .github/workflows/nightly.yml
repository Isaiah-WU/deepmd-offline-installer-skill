name: Nightly Build (Mode C)

# 每天在 GitHub 的 CPU runner 上构建 Mode C 的 per-CUDA 离线包(cu126/cu128/cu130),
# 上传到 GitHub Release(prerelease)。
#
# 【关键设计 — 真门】本工作流【不提交 manifest.json】。manifest 是 dpack 唯一读取的清单,
# 只能由玻尔 GPU 验证道(scripts/verify_and_publish.sh)在 GPU 端到端(torch.cuda + train +
# freeze + lammps)通过后才写入。这样发给用户的(manifest 收录的)永远是 GPU 验证过的变体。
# GitHub runner 没有 GPU,只做"构建"(pip 装 + conda-pack,SKIP_GPU_CHECK 跳过 GPU 自检)。
#
# 【命名/不覆盖】产物名带当天日期(deepmd-kit-<ver>-<date>-<hash>-cudaXXX-...sh.N),所以每天的
# 新构建是【新资产名】,不会覆盖 manifest 当前引用的(已验证)资产;玻尔验过后才把 manifest 指过去。
#
# Mode A 的 cpu/cuda129(conda constructor,完整 TF+JAX+PyTorch)不在本工作流;其 manifest 条目
# 沿用现有。如需自动重建 cpu/cuda129,另开工作流或单独加。

on:
  schedule:
    - cron: '17 2 * * *'          # 每天 02:17 UTC
  workflow_dispatch:
    inputs:
      variant:
        description: '构建哪个变体(首次测试建议先单个,如 cu126)'
        type: choice
        options: [all, cu126, cu128]
        default: all

# 最小权限:顶层只读。
permissions:
  contents: read

defaults:
  run:
    shell: bash -el {0}           # 登录 shell,conda activate 可用

jobs:
  setup:
    name: Select variants
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          V="${{ github.event.inputs.variant || 'all' }}"
          A='{"label":"cuda126","cu":"cu126","cuda":"12.6"}'
          B='{"label":"cuda128","cu":"cu128","cuda":"12.8"}'
          # cuda130(CUDA 13)已弃:deepmd 的 LAMMPS 插件是 CUDA 12 编译的,与 CUDA 13 的 torch
          # 同进程会让 torch JIT 内核崩;CUDA 12 的包(cu126/128)靠驱动向后兼容已覆盖 13.x 机器。
          case "$V" in
            cu126) M="[$A]" ;;
            cu128) M="[$B]" ;;
            *)     M="[$A,$B]" ;;
          esac
          echo "matrix={\"include\":$M}" >> "$GITHUB_OUTPUT"

  resolve:
    name: Resolve latest deepmd-kit
    runs-on: ubuntu-latest
    permissions:
      contents: read             # 只读:检测 PyPI 最新版,不改仓库
    outputs:
      version: ${{ steps.r.outputs.version }}
      changed: ${{ steps.r.outputs.changed }}
      compat_warn: ${{ steps.r.outputs.compat_warn }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: r
        env:
          PRERELEASE: '1'          # 连 b/rc 一起追;改 '0' 只追正式版
        run: |
          pip install -q packaging
          python scripts/detect_latest_deepmd.py

  prepare:
    name: Ensure release exists
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 仅此任务(不跑 pip):确保 release 存在
    steps:
      - uses: actions/checkout@v4
      - name: Ensure & sync rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 单一滚动通道(对照 PyTorch /whl/nightly):一个 nightly release 滚动存放
          # 所有变体的最新日期构建;版本写在文件名里,不在 tag 上。
          # 每次都同步标题/说明(诚实提示:本页资产可能未经 GPU 验证,请用 dpack 安装)。
          TITLE="DeePMD-kit nightly installers (rolling channel)"
          NOTES="每日 CI 自动构建的离线安装包(滚动)。**请用 dpack 安装——它只安装通过 GPU 验证的变体(见 manifest.json)。** 本页资产为 CI 构建、可能尚未通过 GPU 验证,直接下载请自负风险。GPU 验证在玻尔外部进行。"
          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --prerelease --title "$TITLE" --notes "$NOTES"
          else
            gh release create nightly --prerelease --title "$TITLE" --notes "$NOTES"
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: [setup, prepare, resolve]
    # 变了才构建:定时跑时,只有 PyPI 出现比【已发布】更新的 deepmd 才构建;
    # 手动 workflow_dispatch 永远强制构建(迁移/测试用)。版本没变 → 本 job 跳过,零 GPU/零成本。
    if: needs.resolve.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 注意:此任务运行 pip --pre(第三方代码)并需要 contents:write 来上传 release 资产。
    # 安全前提(见仓库 SECURITY 说明):main 应开启分支保护(禁止直接 push),使该 token 无法
    # 把代码推到 main;且本工作流无 pull_request 触发,fork 无法触达。依赖均钉精确版本。
    permissions:
      contents: write
    strategy:
      fail-fast: false           # 一个变体磁盘/网络抖动不连累其它
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Mode C 峰值 ~14-28G)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Disk tripwire
        run: |
          free=$(df -BG --output=avail / | tail -1 | tr -dc 0-9)
          echo "free on / : ${free}G"
          [ "$free" -ge 35 ] || { echo "可用磁盘 <35G,可能放不下 Mode C 构建"; exit 1; }

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          auto-update-conda: true

      - name: Build (Mode C, SKIP_GPU_CHECK)
        env:
          DEEPMD_VER: ${{ needs.resolve.outputs.version }}   # 追最新:用 resolve 解析出的版本
        run: |
          export BUILD_HASH="$(git rev-parse --short HEAD)"
          echo "构建 deepmd-kit ${DEEPMD_VER}  (compat_warn=${{ needs.resolve.outputs.compat_warn }})"
          SKIP_GPU_CHECK=1 bash scripts/build_modec.sh "${{ matrix.cu }}"
          mkdir -p "dist/${{ matrix.label }}"
          mv /tmp/deepmd-kit-*-${{ matrix.label }}-Linux-x86_64.sh "dist/${{ matrix.label }}/"
          # 切片(每个 GPU 包 >2GiB,GitHub 单资产 2GiB 上限),与消费端 split -a 1 -d -n 3 一致
          ( cd "dist/${{ matrix.label }}" && f=$(ls deepmd-kit-*.sh) && split -a 1 -d -n 3 "$f" "$f." && rm -f "$f" )
          ls -lh "dist/${{ matrix.label }}"

      - name: Upload date-stamped parts to release (do NOT clobber verified assets)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="nightly"
          # 不删旧资产:新构建是带当天日期的新文件名,不会覆盖 manifest 引用的(已验证)资产。
          # --clobber 只在"同一天重跑、同名"时生效。
          mapfile -t parts < <(ls dist/${{ matrix.label }}/deepmd-kit-*.sh.[0-9]*)
          [ ${#parts[@]} -gt 0 ] || { echo "no parts produced"; exit 1; }
          gh release upload "$TAG" "${parts[@]}" --clobber
          printf 'uploaded: %s\n' "${parts[@]}"

  prune:
    name: Prune old nightly assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 删旧资产;此任务【不跑 pip】,故写 token 安全
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Prune (keep latest N per variant + never delete manifest-referenced)
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP_BUILDS: '2'
        run: |
          # 安全上线:默认 dry-run(只打印)。确认几晚日志无误后,把仓库变量 PRUNE_APPLY 设为 true 才真删。
          python scripts/prune_release_assets.py ${{ vars.PRUNE_APPLY == 'true' && '--apply' || '' }}

  pass:
    name: Pass
    # 必须 needs 全部"总会跑"的上游(setup/resolve/prepare),否则它们失败时 build 会变成
    # skipped,被下面的 allowed-skips 容忍 → 假绿掩盖真失败。它们【不进 allowed-skips】= 必须成功。
    needs: [setup, resolve, prepare, build, prune]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          # 只豁免 build/prune 的【skipped】(没新版的 no-op 夜):跳过不算失败。
          # allowed-skips 只放宽到 {skipped,success};build/prune 真【运行并失败】仍会标红。
          # setup/resolve/prepare 不在此列 → 它们失败必然标红(防假绿)。
          allowed-skips: build, prune
          jobs: ${{ toJSON(needs) }}
