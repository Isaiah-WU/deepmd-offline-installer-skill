name: Nightly Build (all variants)

# 每天在 GitHub 的 CPU runner 上构建【全部】离线变体(对标 PyTorch nightly 的全矩阵):
#   - cpu / cuda129   → Mode A(conda constructor,完整 TF+JAX+PyTorch)
#   - cuda126 / cuda128 → Mode C(pip torch cuXXX + conda-pack,PyTorch GPU 后端)
#   - cuda131 = cuda128 的同一份字节改名(面向 CUDA 13.1 驱动;deepmd 无原生 CUDA-13 构建)
# 全部在无 GPU 的 runner 上完成。每个变体构建后做一次【无 GPU 冒烟测试】(装上 → dp --version →
# import deepmd),通过后本工作流【直接生成并提交 assets/manifest.json】——dpack 据此为用户选包。
#
# 【为什么没有每晚 GPU 验证门】按导师要求:deepmd 代码由上游 CI(PR 单元测试)保证正确,我们只负责
# "打包";打包流程验证一次通过后即可信任,出问题再修(不设玻尔 GPU 验证道)。详见
# references/verification-log.md。
#
# 【命名/不覆盖】产物名带当天日期:deepmd-kit-<ver>-<date>-<hash>-<variant>-Linux-x86_64.sh,
# 每天是新资产名,不覆盖旧的;>2GiB 的切成 3 片(GitHub 单资产 2GiB 上限),消费端用 cat 拼回。

on:
  schedule:
    - cron: '17 2 * * *'          # 每天 02:17 UTC
  workflow_dispatch:
    inputs:
      variant:
        description: '构建哪个变体(首次测试建议先单个)'
        type: choice
        options: [all, cpu, cuda129, cu126, cu128]
        default: all

# 最小权限:顶层只读。需要写的任务(prepare/build/manifest/prune)各自单独提权。
permissions:
  contents: read

defaults:
  run:
    shell: bash -el {0}           # 登录 shell,conda activate 可用

jobs:
  setup:
    name: Select variants
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        run: |
          V="${{ github.event.inputs.variant || 'all' }}"
          # 每条 matrix 项自带 mode:A=constructor(build.sh);C=pip+conda-pack(build_modec.sh)
          CPU='{"label":"cpu","mode":"A","cuda":"","cu":""}'
          C129='{"label":"cuda129","mode":"A","cuda":"12.9","cu":""}'
          C126='{"label":"cuda126","mode":"C","cuda":"12.6","cu":"cu126"}'
          C128='{"label":"cuda128","mode":"C","cuda":"12.8","cu":"cu128"}'
          case "$V" in
            cpu)     M="[$CPU]" ;;
            cuda129) M="[$C129]" ;;
            cu126)   M="[$C126]" ;;
            cu128)   M="[$C128]" ;;
            *)       M="[$CPU,$C129,$C126,$C128]" ;;   # all = 全矩阵
          esac
          echo "matrix={\"include\":$M}" >> "$GITHUB_OUTPUT"

  resolve:
    name: Resolve latest deepmd-kit
    runs-on: ubuntu-latest
    permissions:
      contents: read             # 只读:检测 PyPI 最新版,不改仓库
    outputs:
      version: ${{ steps.r.outputs.version }}
      changed: ${{ steps.r.outputs.changed }}
      compat_warn: ${{ steps.r.outputs.compat_warn }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - id: r
        env:
          PRERELEASE: '1'          # 连 b/rc 一起追;改 '0' 只追正式版
        run: |
          pip install -q packaging
          python scripts/detect_latest_deepmd.py

  prepare:
    name: Ensure release exists
    needs: [resolve]
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 仅此任务(不跑 pip):确保 per-version release 存在
    steps:
      - uses: actions/checkout@v4
      - name: Ensure per-version release exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          # 每版本一个 release(tag=v<version>):存放该版本所有变体的分片。
          TAG="v${VERSION}"
          TITLE="DeePMD-kit ${VERSION} offline installers"
          NOTES="deepmd-kit ${VERSION} 的离线安装包(CI 自动构建 + 无 GPU 冒烟测试)。**推荐用 dpack 安装**(它按你的机器自动选变体、下载、校验 sha256;见 assets/manifest.json)。"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --prerelease --title "$TITLE" --notes "$NOTES"
          else
            gh release create "$TAG" --prerelease --title "$TITLE" --notes "$NOTES"
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: [setup, resolve, prepare]
    # 变了才构建:定时跑时,只有 PyPI 出现比【已发布】更新的 deepmd 才构建;
    # 手动 workflow_dispatch 永远强制构建。版本没变 → 本 job 跳过,零成本。
    if: needs.resolve.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # 此任务运行 pip/constructor(第三方代码)并需要 contents:write 上传 release 资产。
    # 安全前提:本工作流无 pull_request 触发(fork 无法触达),依赖均钉精确版本。
    permissions:
      contents: write
    strategy:
      fail-fast: false           # 一个变体抖动不连累其它
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (峰值可达 ~14-28G)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Disk tripwire
        run: |
          free=$(df -BG --output=avail / | tail -1 | tr -dc 0-9)
          echo "free on / : ${free}G"
          [ "$free" -ge 35 ] || { echo "可用磁盘 <35G,可能放不下构建"; exit 1; }

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          auto-update-conda: true

      - name: Build (Mode ${{ matrix.mode }})
        env:
          DEEPMD_VER: ${{ needs.resolve.outputs.version }}
        run: |
          export BUILD_HASH="$(git rev-parse --short HEAD)"
          mkdir -p "dist/${{ matrix.label }}"
          echo "构建 ${{ matrix.label }} (Mode ${{ matrix.mode }}) deepmd ${DEEPMD_VER}"
          if [ "${{ matrix.mode }}" = "A" ]; then
            # Mode A:conda constructor。无 GPU 靠 CONDA_OVERRIDE_CUDA 解 CUDA 依赖(build.sh 内处理)。
            CUDA_ARG=""; [ -n "${{ matrix.cuda }}" ] && CUDA_ARG="--cuda ${{ matrix.cuda }}"
            bash scripts/build.sh --version "$DEEPMD_VER" $CUDA_ARG   # 输出到 dist/${{ matrix.label }}/
          else
            # Mode C:pip torch cuXXX + conda-pack。SKIP_GPU_CHECK 跳过 GPU 自检(runner 无 GPU)。
            SKIP_GPU_CHECK=1 bash scripts/build_modec.sh "${{ matrix.cu }}"
            mv /tmp/deepmd-kit-*-${{ matrix.label }}-Linux-x86_64.sh "dist/${{ matrix.label }}/"
          fi
          ls -lh "dist/${{ matrix.label }}"

      - name: Smoke test (no GPU — 装上 + dp --version + import deepmd)
        run: |
          # 这就是导师要的"打包流程验证":不需 GPU,只证明装得上、能 import、dp 能跑。
          sh_file="$(ls dist/${{ matrix.label }}/deepmd-kit-*.sh)"
          echo "smoke: installing $sh_file"
          rm -rf /tmp/smoke
          bash "$sh_file" -b -p /tmp/smoke
          set +u; source /tmp/smoke/bin/activate; set -u
          dp --version
          python -c "import deepmd; print('deepmd', getattr(deepmd, '__version__', '?'))"
          if command -v lmp >/dev/null 2>&1; then lmp -h >/dev/null 2>&1 && echo "lmp -h OK"; fi
          set +u; conda deactivate 2>/dev/null || true; set -u
          rm -rf /tmp/smoke
          echo "✅ 冒烟测试通过:${{ matrix.label }}"

      - name: Split (>2GiB) + build cuda131 alias
        run: |
          d="dist/${{ matrix.label }}"
          f="$(ls "$d"/deepmd-kit-*.sh)"
          sz=$(stat -c%s "$f")
          if [ "$sz" -gt 2000000000 ]; then
            echo "切片(${sz}B > 2GiB)"
            ( cd "$d" && b="$(basename "$f")" && split -a 1 -d -n 3 "$b" "$b." && rm -f "$b" )
          fi
          # cuda131 = cuda128 同字节改名(deepmd 无原生 CUDA-13;靠驱动向后兼容跑 13.1)
          if [ "${{ matrix.label }}" = "cuda128" ]; then
            mkdir -p dist/cuda131
            for p in dist/cuda128/deepmd-kit-*; do
              cp "$p" "dist/cuda131/$(basename "$p" | sed 's/cuda128/cuda131/')"
            done
            ls -lh dist/cuda131
          fi

      - name: Upload assets to release (不覆盖已验证:新构建是带日期的新文件名)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          TAG="v${VERSION}"
          mapfile -t parts < <(ls dist/${{ matrix.label }}/deepmd-kit-*)
          [ ${#parts[@]} -gt 0 ] || { echo "no artifacts produced"; exit 1; }
          gh release upload "$TAG" "${parts[@]}" --clobber
          printf 'uploaded: %s\n' "${parts[@]}"
          if [ "${{ matrix.label }}" = "cuda128" ]; then
            mapfile -t p131 < <(ls dist/cuda131/deepmd-kit-*)
            gh release upload "$TAG" "${p131[@]}" --clobber
            printf 'uploaded(alias): %s\n' "${p131[@]}"
          fi

      - name: Generate manifest fragment(s)
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          # 后端 + note 都必须显式传:否则 gen 脚本会给 GPU 变体套用通用默认 note,把 Mode C 的说明冲掉。
          MODEC_NOTE="Mode C (conda-pack self-extracting). PyTorch GPU backend; CPU-only TensorFlow bundled to load the LAMMPS plugin."
          MODEA_NOTE="Covers the CUDA 12.x ~ 13.x driver line via NVIDIA minor-version compatibility."
          if [ "${{ matrix.mode }}" = "A" ]; then BK="tf+jax+torch"; NOTE="$MODEA_NOTE"; else BK="pytorch"; NOTE="$MODEC_NOTE"; fi
          REPO="${{ github.repository }}" CUDA="${{ matrix.cuda }}" VERSION="$VERSION" TAG="v$VERSION" \
            BACKEND="$BK" NOTE="$NOTE" python scripts/gen_manifest_fragment.py
          # cuda131 片段(同字节 → 同 sha;Mode C 后端 + note;cuda=13.1)
          if [ "${{ matrix.label }}" = "cuda128" ]; then
            REPO="${{ github.repository }}" CUDA="13.1" VERSION="$VERSION" TAG="v$VERSION" \
              BACKEND="pytorch" NOTE="$MODEC_NOTE" python scripts/gen_manifest_fragment.py
          fi

      - name: Upload fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: frag-${{ matrix.label }}
          path: frag/
          if-no-files-found: error

  manifest:
    name: Merge fragments -> manifest.json -> commit
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 提交 manifest.json;此任务【不跑 pip 第三方代码】,故写 token 安全
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download all fragments
        uses: actions/download-artifact@v4
        with:
          path: frag
          pattern: frag-*
          merge-multiple: true
      - name: Merge -> assets/manifest.json
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          pip install -q packaging
          ls -R frag || true
          REPO="${{ github.repository }}" VERSION="$VERSION" python scripts/merge_manifest.py
      - name: Commit + push manifest.json
        run: |
          git config user.name  "nightly-bot"
          git config user.email "nightly-bot@users.noreply.github.com"
          git add assets/manifest.json
          if git diff --cached --quiet; then
            echo "manifest 无变化"
          else
            git commit -m "nightly: 更新 manifest(deepmd ${{ needs.resolve.outputs.version }})"
            git pull --rebase origin main
            git push
          fi

  prune:
    name: Prune old release assets
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write            # 删旧资产;此任务【不跑 pip】,故写 token 安全
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Prune (keep latest N per variant + never delete manifest-referenced)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.resolve.outputs.version }}
          KEEP_BUILDS: '2'
        run: |
          # 默认 dry-run(只打印)。确认几晚日志无误后,把仓库变量 PRUNE_APPLY 设为 true 才真删。
          python scripts/prune_release_assets.py ${{ vars.PRUNE_APPLY == 'true' && '--apply' || '' }}

  pass:
    name: Pass
    # setup/resolve/prepare 必须成功(不进 allowed-skips → 失败必标红,防假绿);
    # build/manifest/prune 在"没新版的 no-op 夜"会 skipped,允许跳过。
    needs: [setup, resolve, prepare, build, manifest, prune]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: build, manifest, prune
          jobs: ${{ toJSON(needs) }}
