{% set version = os.environ.get("VERSION") %}
{% set cuda_version = os.environ.get("CUDA_VERSION") %}
{% set tf_version = os.environ.get("TF_VERSION", ">=2.19") %}
{% set lammps_version = os.environ.get("LAMMPS_VERSION", "") %}
{% set torch_version = os.environ.get("TORCH_VERSION", "") %}
{% set backend = os.environ.get("DP_BACKEND", "all") %}
{% set local_channel = os.environ.get("DEEPMD_LOCAL_CHANNEL", "") %}
{% set build_string = os.environ.get("DEEPMD_BUILD", "") %}
{% set py_version = os.environ.get("DEEPMD_PY_VERSION", "") %}
{% set with_tf = backend in ("all","tensorflow") %}
{% set with_pt = backend in ("all","pytorch") and torch_version %}
{% set with_jax = backend in ("all","jax") %}
{% if cuda_version %}
{% set variant = "cuda" %}
{% set variant_version = "cuda" + cuda_version.replace(".", "") %}
{% else %}
{% set variant = "cpu" %}
{% set variant_version = "cpu" %}
{% endif %}

name: deepmd-kit
version: {{ version }}-{{ variant_version }}

channels:
{% if local_channel %}
- {{ local_channel }}
{% endif %}
- https://conda.anaconda.org/conda-forge/label/deepmd-kit_rc
- https://conda.anaconda.org/conda-forge

specs:
- deepmd-kit {{ version }} {% if build_string %}{{ build_string }}{% else %}{{ variant }}*{% endif %}
{% if py_version %}
- python {{ py_version }}.*
{% endif %}
- lammps{% if lammps_version %} {{ lammps_version }}{% endif %}
- horovod * {{ variant }}*
- mpi4py
- dpdata
- conda
{% if cuda_version %}
- cuda-version {{ cuda_version }}
# libdevice-hack symlinks libdevice.10.bc into the pip-wheel layout TF>=2.19
# expects. Pin the py_5 build (cuda-nvvm based) so the legacy cudatoolkit py_3
# build can never be selected, and pull cuda-nvvm so the real target exists.
- njzjz/noarch::libdevice-hack-for-tensorflow=*=py_5
- cuda-nvvm
- openmpi
{% endif %}
- libblas * *mkl
{% if with_tf %}
- tensorflow {{ tf_version }}
{% endif %}
{% if with_pt %}
- pytorch {{ torch_version }}
{% endif %}
{% if with_jax %}
- jax
- jaxlib * {{ variant }}*
- flax >=0.10.0
- orbax-checkpoint
{% endif %}

ignore_duplicate_files: True
license_file: ../LICENSE
company: DeepModeling
pre_install: pre_install.sh
post_install: post_install.sh
